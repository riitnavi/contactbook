<!DOCTYPE html>
<html>
<head>
    <title>Add Contact</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        .box{
            width: 400px;
            margin: 100px auto;
            border: 3px solid black;
            padding: 20px;
            background-color: white;
        }

        h2{
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group{
            margin-bottom: 15px;
        }

        label{
            display: inline-block;
            width: 80px;
            font-size: 20px;
        }

        input{
            width: 220px;
            padding: 8px;
            font-size: 16px;
        }

        button{
            margin-left: 120px;
            padding: 10px 25px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="box">

        <h2>Add Contact.html</h2>

        <form>

            <div class="form-group">
                <label>Name :</label>
                <input type="text" placeholder="Enter Name">
            </div>

            <div class="form-group">
                <label>Email :</label>
                <input type="email" placeholder="Enter Email">
            </div>

            <div class="form-group">
                <label>Phone :</label>
                <input type="text" placeholder="Enter Phone">
            </div>

            <button type="submit">Update</button>

        </form>

    </div>

</body>
</html>
